name: Build App

run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
            node-version: 22
      - name: Install dependencies
        run: npm ci

      - name: Build App
        run: npm run build -- --publish never