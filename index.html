<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <title>To Do List</title>
    <link rel="stylesheet" href="./src/styles/style.css">
    <script src="./src/renderer/app.js" type="module"></script>
</head>

<body>
    <div id="root">
        <div id="title-bar">
            <h1 id="title">New List</h1>
            <input id="title-input" type="text" hidden="true" maxlength="10">
            <div id="window-controls">
                <button id="minimize-button">-</button>
                <button id="close-button">x</button>
            </div>
        </div>
        <div id="list-select-container">
            <select id="list-select">
            </select>
            <button id="add-list-button">+</button>
            <button class="delete-list">-</button>
        </div>

        <div id="list">
            <ul id="todo-list">
            </ul>

            <div id="no-tasks" hidden="true">
                <span id="no-tasks-text">No tasks yet.</span>
                <button class="delete-list">delete list</button>
            </div>
        </div>




        <div class="form">
            <input id="item-input" type="text" placeholder="New task...">
            <button id="add-button" type="submit">+</button>
        </div>
    </div>
</body>

</html>
